services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: blog_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./src:/var/www
      - /mnt/nvme/blog-storage:/var/www/storage/app
    networks:
      - nextcloud-net
    environment:
      - APP_ENV=production
      - APP_DEBUG=false

  nginx:
    image: nginx:alpine
    container_name: blog_nginx
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - ./src:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - nextcloud-net
    depends_on:
      - app

  redis:
    image: redis:alpine
    container_name: blog_redis
    restart: unless-stopped
    networks:
      - nextcloud-net

networks:
  nextcloud-net:
    external: true
